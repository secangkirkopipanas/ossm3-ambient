apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    istio-discovery: enabled

---
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
spec:
  namespace: istio-system
  version: v1.24.3
  telemetry:
    enabled: true
    prometheus:
      enabled: true
      replicaCount: 1
      resources:
        requests:
          memory: 512Mi
          cpu: 250m
        limits:
          memory: 1Gi
          cpu: 500m
  values:
    pilot:
      trustedZtunnelNamespace: ztunnel
      autoscaleEnabled: true
      autoscaleMin: 1
      autoscaleMax: 5
      cpu:
        targetAverageUtilization: 70
    profile: ambient
    meshConfig:
      discoverySelectors:
        - matchLabels:
            istio-discovery: enabled
      enableTracing: true
      accessLogFile: /dev/stdout
  updateStrategy:
    type: InPlace
    inactiveRevisionDeletionGracePeriodSeconds: 30
